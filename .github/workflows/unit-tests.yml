name: Unit and E2E tests
on:
  workflow_dispatch:
  workflow_call:

jobs:
  tests:
    name: Run All Tests
    runs-on: ubuntu-latest
    env:
      # Global env vars for the runner
      SESSION_SECRET: "unit-test-secret"
      SESSION_NAME: "sessionId"
      AUTH_REDIRECT_URL: "http://localhost/auth/redirect"
      AUTH_CLIENT_ID: "test-client-id"
      AUTH_CLIENT_SECRET: "test-client-secret"
      AUTH_DIRECTORY_URL: "https://login.microsoftonline.com/test-tenant-id"
      BACKEND_URL: "http://localhost:8080" # Point to WireMock port

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start WireMock
        # Fixed indentation and completed the timeout command
        run: |
          docker run -d -p 8080:8080 --name wiremock wiremock/wiremock:latest
          timeout 30s bash -c 'until curl -s http://localhost:8080/__admin/mappings > /dev/null; do sleep 1; done'

      - name: Setup Mock Data
        run: |
          curl -X POST http://localhost:8080/__admin/mappings \
          -d '{
            "request": { "method": "ANY", "urlPathPattern": "/applications.*" },
            "response": { 
              "status": 200, 
              "body": "[]", 
              "headers": { "Content-Type": "application/json" } 
            }
          }'

      - name: Run unit tests
        run: bun test tests/unit

      - name: Run E2E tests
        run: bunx playwright test
        env:
          # Crucial: This must match the WireMock port (8080), NOT your app port (3000)
          BACKEND_URL: http://localhost:8080
