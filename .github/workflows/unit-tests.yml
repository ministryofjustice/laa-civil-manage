name: Unit tests
on:
  workflow_dispatch: # Allow manual triggering only
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"
  workflow_call: # Allow this workflow to be called by other workflows

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: "unit-test-secret"
      SESSION_NAME: "sessionId"
      AUTH_REDIRECT_URL: "http://localhost/auth/redirect"
      AUTH_CLIENT_ID: "test-client-id"
      AUTH_CLIENT_SECRET: "test-client-secret"
      AUTH_DIRECTORY_URL: "https://login.microsoftonline.com/test-tenant-id"

    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "25.5.0"
          package-manager-cache: false

      - name: Install Corepack
        run: npm install -g corepack --force

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit tests
        run: yarn test:unit
