name: Unit tests
on:
  workflow_dispatch: # Allow manual triggering only
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "dev"
  workflow_call: # Allow this workflow to be called by other workflows

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: "unit-test-secret"
      SESSION_NAME: "sessionId"
      AUTH_REDIRECT_URL: "http://localhost/auth/redirect"
      AUTH_CLIENT_ID: "test-client-id"
      AUTH_CLIENT_SECRET: "test-client-secret"
      AUTH_DIRECTORY_URL: "https://login.microsoftonline.com/test-tenant-id"

    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test tests/unit

      - name: Run E2E tests
        run:
          SESSION_SECRET: ${{ env.SESSION_SECRET }}
          SESSION_NAME: ${{ env.SESSION_NAME }}
          AUTH_REDIRECT_URL: ${{ env.AUTH_REDIRECT_URL }}
          AUTH_CLIENT_ID: ${{ env.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET: ${{ env.AUTH_CLIENT_SECRET }}
          AUTH_DIRECTORY_URL: ${{ env.AUTH_DIRECTORY_URL }}
