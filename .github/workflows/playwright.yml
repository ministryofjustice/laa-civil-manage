name: Playwright Tests
on:
  workflow_dispatch: # Allow manual triggering only
  workflow_call: # Allow this workflow to be called by other workflows

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Mark this job as required for PR checks
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2
        with:
          fetch-depth: 0 # Fetch all history for proper change detection

      - name: Set up Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('**/yarn.lock') }}

      - name: Run Playwright tests
        run: bun run test:playwright
        env:
          CI: true
          AUTH_DIRECTORY_URL: ""
          AUTH_CLIENT_ID: ""
          AUTH_CLIENT_SECRET: ""
          AUTH_REDIRECT_URL: ""
          SESSION_SECRET: "playwright-test-secret"
          SESSION_NAME: "sessionId"
          SKIP_AUTH: "true"
          SERVICE_NAME: "Civil Manage"
          RATE_LIMIT_MAX: "10000"
          RATE_WINDOW_MS: "900000"

      - name: Notify on test failure
        if: failure()
        run: echo "::error::Playwright tests failed! Check the test report for details."
