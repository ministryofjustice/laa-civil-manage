name: ZAP Security Scanning
on:
  workflow_dispatch: # Allow manual triggering only
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "25.8.0"
          package-manager-cache: false

      - name: Install Corepack
        run: npm install -g corepack --force

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Create tmp directory for ZAP reports
        run: |
          mkdir -p tmp
          chmod 777 tmp

      - name: Run Zap Security Scan against Civil Manage
        run: |
          yarn run security:zap:ci

      - name: Upload ZAP HTML Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zap-scan-report-html
          path: tmp/zap-baseline-report.html
