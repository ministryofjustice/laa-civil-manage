name: Deploy to DEV and staging

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Github deployment environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  contents: read

jobs:
  code-linting:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # - name: Set up Bun
      #   uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      #   with:
      #     bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Prettier check
        run: bun run format:check

      - name: Run ESLint
        run: bun run lint:check

  code-security-audit:
    name: Code Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: bun audit || true

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Build local Docker image
        working-directory: ${{ github.workspace }}
        run: |
          docker build -t laa-civil-manage ./
          docker save laa-civil-manage -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          image: image.tar
          args: --docker --severity-threshold=high
            --file=Dockerfile --policy-path=.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

          image_tag: ${{ github.sha }}

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    # Only run tests when deploying to dev
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  playwright:
    name: Playwright Tests
    uses: ./.github/workflows/playwright.yml
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  build-and-push-image:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Build and push image with local action
        uses: ./.github/actions/build_and_push
        with:
          region: ${{ vars.ECR_REGION }}
          role_to_assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          image_registry: ${{ secrets.ECR_REGISTRY_URL }}
          image_repo: ${{ vars.ECR_REPOSITORY }}
          dockerfile_path: Dockerfile

  zap-scan:
    name: ZAP Security Scanning
    uses: ./.github/workflows/zap-scanning.yml
    needs:
      - build-and-push-image
    # Only run tests when deploying to dev
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  deploy-dev:
    if: github.actor != 'dependabot[bot]' && !failure() && !cancelled()
    environment: dev
    runs-on: ubuntu-latest
    needs:
      - code-linting
      - code-security-audit
      - snyk
      - build-and-push-image
      - zap-scan
      - unit-tests
      - playwright

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Deploy to dev
        uses: ./.github/actions/deploy
        with:
          app-environment: dev
          auth_client_id: ${{ secrets.AUTH_CLIENT_ID }}
          auth_client_secret: ${{ secrets.AUTH_CLIENT_SECRET }}
          auth_directory_url: ${{ secrets.AUTH_DIRECTORY_URL }}
          auth_redirect_url: ${{ secrets.AUTH_REDIRECT_URL }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          service_name: ${{ vars.SERVICE_NAME }}
          session_name: ${{ vars.SESSION_NAME }}
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          backend_url: ${{ vars.BACKEND_URL }}
          skip_auth: ${{vars.SKIP_AUTH}}
          department_name: ${{ vars.DEPARTMENT_NAME }}

  deploy-staging:
    if: github.actor != 'dependabot[bot]' && !failure() && !cancelled()
    environment: staging
    runs-on: ubuntu-latest
    needs:
      - deploy-dev
      - code-linting
      - code-security-audit
      - snyk
      - build-and-push-image
      - zap-scan
      - unit-tests
      - playwright

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

 
      - name: Debug Variable
        run: |
          echo "The value for SKIP_AUTH is: ${{ vars.SKIP_AUTH }}"

      - name: Deploy to staging
        uses: ./.github/actions/deploy
        with:
          app-environment: staging
          auth_client_id: ${{ secrets.AUTH_CLIENT_ID }}
          auth_client_secret: ${{ secrets.AUTH_CLIENT_SECRET }}
          auth_directory_url: ${{ secrets.AUTH_DIRECTORY_URL }}
          auth_redirect_url: ${{ secrets.AUTH_REDIRECT_URL }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          service_name: ${{ vars.SERVICE_NAME }}
          session_name: ${{ vars.SESSION_NAME }}
          session_secret: ${{ secrets.SESSION_SECRET }}
          service_phase: ${{ vars.SERVICE_PHASE }}
          backend_url: ${{ vars.BACKEND_URL }}
          skip_auth: ${{vars.SKIP_AUTH}}
          department_name: ${{ vars.DEPARTMENT_NAME }}
