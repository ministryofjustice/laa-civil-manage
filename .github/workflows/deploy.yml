name: Deploy to DEV

on:
  push:
    branches:
      - main
  # pull_request:
  #   # From docs: if no activity types are specified, the workflow runs when a pull request is opened or reopened or when the head branch of the pull request is updated.
  #   paths:
  #     - "deploy/**"
  #     - ".github/**"
  #     - "src/**"
  #     - "tests/**"
  #     - "Dockerfile"
  #     - "yarn.lock"
  workflow_dispatch:
    inputs:
      environment:
        description: "Github deployment environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev

jobs:
  code-linting:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.5.0"
          package-manager-cache: false

      - name: Install Corepack
        run: npm install -g corepack --force

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint
        run: yarn lint

  code-security-audit:
    name: Code Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.5.0"
          package-manager-cache: false

      - name: Install Corepack
        run: npm install -g corepack --force

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run security audit
        run: yarn npm audit

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build local Docker image
        working-directory: ${{ github.workspace }}
        run: |
          docker build -t laa-civil-manage ./
          docker save laa-civil-manage -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          image: image.tar
          args: --docker --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up AWS credentials for ECR and Kubernetes
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076
        id: login-ecr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          install: true

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push image with local action
        uses: ./.github/actions/build_and_push
        with:
          image_registry: ${{ secrets.ECR_REGISTRY_URL }}
          image_repo: ${{ vars.ECR_REPOSITORY }}
          dockerfile_path: Dockerfile
          image_tag: ${{ github.sha }}

  # unit-tests:
  #   name: Unit Tests
  #   uses: ./.github/workflows/unit-tests.yml
  #   needs:
  #     - build-image
  #   # Only run tests when deploying to dev
  #   if: success() && (github.event_name != 'workflow_dispatch' ||
  #     (github.event_name == 'workflow_dispatch' &&
  #     github.event.inputs.environment == 'dev' ||
  #     github.event.inputs.environment == null))

  playwright:
    name: Playwright Tests
    uses: ./.github/workflows/playwright.yml
    needs:
      - build-image
    # Only run tests when deploying to dev
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  # zap-scan:
  #   name: ZAP Security Scanning
  #   uses: ./.github/workflows/zap-scanning.yml
  #   needs:
  #     - build-image
  #   # Only run tests when deploying to dev
  #   if: success() && (github.event_name != 'workflow_dispatch' ||
  #     (github.event_name == 'workflow_dispatch' &&
  #     github.event.inputs.environment == 'dev' ||
  #     github.event.inputs.environment == null))

  deploy-dev:
    if: ${{ !contains(github.actor, '[bot]') }}
    # environment: dev
    runs-on: ubuntu-latest
    needs:
      - code-linting
      - code-security-audit
      - snyk
      - build-image
      # - unit-tests
      - playwright
      # - zap-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to dev
        uses: ./.github/actions/deploy
        with:
          app-environment: dev
          # auth_client_id: ${{ vars.AUTH_CLIENT_ID }}
          # auth_client_secret: ${{ vars.AUTH_CLIENT_SECRET }}
          # auth_directory_url: ${{ vars.AUTH_DIRECTORY_URL }}
          # auth_redirect_url: ${{ vars.AUTH_REDIRECT_URL }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          # ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          # ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          # service_name: ${{ vars.SERVICE_NAME }}
          # session_name: ${{ vars.SESSION_NAME}}
          # session_secret: ${{ secrets.SESSION_SECRET }}

