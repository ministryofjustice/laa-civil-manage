name: Deploy to DEV

on:
  push:
    branches:
      - main
  pull_request:
    # From docs: if no activity types are specified, the workflow runs when a pull request is opened or reopened or when the head branch of the pull request is updated.
    paths:
      - "deploy/**"
      - ".github/**"
      - "src/**"
      - "tests/**"
      - "Dockerfile"
      - "yarn.lock"
  workflow_dispatch:
    inputs:
      environment:
        description: "Github deployment environment"
        required: false
        default: "dev"
        type: choice
        options:
          - dev

jobs:
  code-linting:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "25.5.0"
          package-manager-cache: false

      - name: Install Corepack
        run: npm install -g corepack --force

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Prettier check
        run: yarn format:check

      - name: Run ESLint
        run: yarn lint:check

  code-security-audit:
    name: Code Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "25.5.0"
          package-manager-cache: false

      - name: Install Corepack
        run: npm install -g corepack --force

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run security audit
        run: yarn npm audit

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Build local Docker image
        working-directory: ${{ github.workspace }}
        run: |
          docker build -t laa-civil-manage ./
          docker save laa-civil-manage -o image.tar

      - name: Run Snyk to scan Docker image from tarball
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          image: image.tar
          args: --docker --severity-threshold=high
            --file=Dockerfile --policy-path=.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

          image_tag: ${{ github.sha }}

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    # Only run tests when deploying to dev
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  playwright:
    name: Playwright Tests
    uses: ./.github/workflows/playwright.yml
    needs:
      - unit-tests
    # Only run tests when deploying to dev
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      # - playwright
    if: github.actor != 'dependabot[bot]'
    # environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Set up AWS credentials for ECR and Kubernetes
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0
        id: login-ecr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push image with local action
        uses: ./.github/actions/build_and_push
        with:
          image_registry: ${{ secrets.ECR_REGISTRY_URL }}
          image_repo: ${{ vars.ECR_REPOSITORY }}
          dockerfile_path: Dockerfile

  zap-scan:
    name: ZAP Security Scanning
    uses: ./.github/workflows/zap-scanning.yml
    needs:
      - build-image
    # Only run tests when deploying to dev
    if: success() && (github.event_name != 'workflow_dispatch' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'dev' ||
      github.event.inputs.environment == null))

  deploy-dev:
    if: github.actor != 'dependabot[bot]' && !failure() && !cancelled()
    environment: dev
    runs-on: ubuntu-latest
    needs:
      - code-linting
      - code-security-audit
      - snyk
      - build-image
      - unit-tests
      # - playwright
      # - zap-scan

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Deploy to dev
        uses: ./.github/actions/deploy
        with:
          app-environment: dev
          auth_client_id: ${{ secrets.AUTH_CLIENT_ID }}
          auth_client_secret: ${{ secrets.AUTH_CLIENT_SECRET }}
          auth_directory_url: ${{ secrets.AUTH_DIRECTORY_URL }}
          auth_redirect_url: ${{ secrets.AUTH_REDIRECT_URL }}
          ecr-repository: ${{ vars.ECR_REPOSITORY }}
          ecr-registry_url: ${{ secrets.ECR_REGISTRY_URL }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          ratelimit_max: ${{ vars.RATE_LIMIT_MAX }}
          ratewindow_ms: ${{ vars.RATE_WINDOW_MS }}
          service_name: ${{ vars.SERVICE_NAME }}
          session_name: ${{ vars.SESSION_NAME }}
          session_secret: ${{ secrets.SESSION_SECRET }}
          backend_url: ${{ vars.BACKEND_URL }}

