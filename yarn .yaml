name: laa-civil-manage

services:
  frontend:
    container_name: frontend
    depends_on: [redis]
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8888:3000"
    environment:
      BASE_URL_MAP: '{"urls":{"default":"http://localhost:3000/mock-data"}}'
      NODE_ENV: production
      AUTH_REDIRECT_URL: http://localhost:8888/auth/redirect
      SESSION_REDIS_URL: redis://redis:6379

  redis:
    container_name: redis
    image: "redis:7.2-alpine"
    ports:
      - "6379:6379"
