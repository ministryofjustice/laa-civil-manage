  "components":
    {
      "schemas":
        {
          "ApplicationCreateRequest":
            {
              "type": "object",
              "description": "Create an application (all fields inside `applicationContent`)",
              "properties":
                {
                  "status":
                    {
                      "type": "string",
                      "enum":
                        ["APPLICATION_IN_PROGRESS", "APPLICATION_SUBMITTED"],
                    },
                  "applicationContent":
                    {
                      "type": "object",
                      "additionalProperties": {},
                      "description": "Application data to create",
                    },
                  "laaReference":
                    {
                      "type": "string",
                      "maxLength": 2147483647,
                      "minLength": 1,
                    },
                  "individuals":
                    {
                      "type": "array",
                      "items": { "$ref": "#/components/schemas/Individual" },
                      "maxItems": 2147483647,
                      "minItems": 1,
                    },
                },
              "required":
                ["applicationContent", "individuals", "laaReference", "status"],
            },
          "Individual":
            {
              "type": "object",
              "properties":
                {
                  "firstName": { "type": "string" },
                  "lastName": { "type": "string" },
                  "dateOfBirth": { "type": "string", "format": "date" },
                  "details": { "type": "object", "additionalProperties": {} },
                  "type": { "type": "string", "enum": ["CLIENT"] },
                },
              "required":
                ["dateOfBirth", "details", "firstName", "lastName", "type"],
            },
          "CaseworkerUnassignRequest":
            {
              "type": "object",
              "description": "Optional event history describing the unassignment action",
              "properties":
                {
                  "eventHistory":
                    { "$ref": "#/components/schemas/EventHistory" },
                },
              "required": ["eventHistory"],
            },
          "EventHistory":
            {
              "type": "object",
              "properties": { "eventDescription": { "type": "string" } },
            },
          "CaseworkerAssignRequest":
            {
              "type": "object",
              "description": "Assign the supplied caseworker to one or more applications.",
              "properties":
                {
                  "caseworkerId": { "type": "string", "format": "uuid" },
                  "applicationIds":
                    {
                      "type": "array",
                      "items": { "type": "string", "format": "uuid" },
                      "maxItems": 2147483647,
                      "minItems": 1,
                    },
                  "eventHistory":
                    { "$ref": "#/components/schemas/EventHistory" },
                },
              "required": ["applicationIds", "caseworkerId"],
            },
          "ApplicationUpdateRequest":
            {
              "type": "object",
              "description": "Partial update of application (all fields inside `applicationContent`)",
              "properties":
                {
                  "status":
                    {
                      "type": "string",
                      "enum":
                        ["APPLICATION_IN_PROGRESS", "APPLICATION_SUBMITTED"],
                    },
                  "applicationContent":
                    {
                      "type": "object",
                      "additionalProperties": {},
                      "description": "Application data to update",
                    },
                },
              "required": ["applicationContent"],
            },
          "MakeDecisionProceeding":
            {
              "type": "object",
              "properties":
                {
                  "proceedingId": { "type": "string", "format": "uuid" },
                  "meritsDecision":
                    { "$ref": "#/components/schemas/MeritsDecisionDetails" },
                },
              "required": ["meritsDecision", "proceedingId"],
