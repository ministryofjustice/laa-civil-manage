name: laa-civil-manage

services:
  frontend:
    container_name: frontend
    depends_on: [redis]
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8888:3000"
    environment:
      BASE_URL_MAP: '{"urls":{"default":"http://localhost:3000/mock-data"}}'
      NODE_ENV: production
      AUTH_REDIRECT_URL: http://localhost:8888/auth/redirect
      SESSION_REDIS_URL: redis://redis:6379
      CONTACT_EMAIL: CONTACT_EMAIL
      DEPARTMENT_NAME: DEPARTMENT_NAME
      DEPARTMENT_URL: DEPARTMENT_URL
      RATELIMIT_HEADERS_ENABLED: True
      RATELIMIT_STORAGE_URI: DATA_BASE_URL
      RATE_LIMIT_MAX: 100
      RATE_WINDOW_MS: 900000
      SERVICE_NAME: DOCKER COMPOSE
      SERVICE_PHASE: Alpha
      SERVICE_URL: SERVICE_URL
      SESSION_SECRET:
      SESSION_NAME: sessionId
      BACKEND_URL: http://host.docker.internal:8080

  redis:
    container_name: redis
    image: "redis:8.6-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17"
    ports:
      - "6379:6379"
